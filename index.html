<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinemascope Visual Media</title>
    <style>
        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #050505; /* Deep cinematic black */
            color: #ffffff;
            text-align: center;
        }
        header {
            padding: 120px 20px;
            background: linear-gradient(180deg, #111111 0%, #050505 100%);
            border-bottom: 1px solid #222;
        }
        h1 {
            font-size: 3.5em;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 0 0 10px 0;
        }
        h2 {
            font-size: 1.5em;
            color: #d4af37; /* Cinematic gold accent */
            font-weight: 300;
            letter-spacing: 2px;
            margin: 0;
        }
        .content {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 20px;
            line-height: 1.6;
            color: #cccccc;
        }
        .services {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .service-tag {
            border: 1px solid #333;
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 0.9em;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        footer {
            margin-top: 40px;
            padding: 50px 20px;
            background-color: #0a0a0a;
            border-top: 1px solid #222;
        }
        .contact-info p {
            margin: 10px 0;
            color: #999;
        }
        a {
            color: #d4af37;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        a:hover {
            color: #ffffff;
        }

        /* Responsive Header Styles */
        @media (max-width: 768px) {
            header {
                padding: 60px 20px;
            }
            h1 {
                font-size: 2em;
                letter-spacing: 2px;
            }
            h2 {
                font-size: 1.2em;
                letter-spacing: 1px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Cinemascope Visual Media</h1>
        <h2>Widescreen Storytelling</h2>
    </header>

    <div class="content">
        <p>Welcome to the digital home of Cinemascope Visual Media Private Limited.</p>
        
        <div class="services">
            <div class="service-tag">Cinematography</div>
            <div class="service-tag">Photography</div>
            <div class="service-tag">Video Editing</div>
            <div class="service-tag">Graphic Design</div>
        </div>
    </div>

    <footer>
        <div class="contact-info">
            <p><strong>Rahul Dravid M V</strong> | Founder & CEO</p>
            <p>Email: <a href="mailto:rahuldravidmv@gmail.com">rahuldravidmv@gmail.com</a></p>
            <p>Phone: +91 9535190476</p>
            <p>Instagram: <a href="https://instagram.com/born_to_shoot_" target="_blank" rel="noopener noreferrer">@born_to_shoot_</a></p>
        </div>
    </footer>

</body>
</html>
