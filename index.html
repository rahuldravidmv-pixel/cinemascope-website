<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinemascope Visual Media</title>
    <style>
        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #050505; /* Deep cinematic black */
            color: #ffffff;
            text-align: center;
        }
        header {
            padding: 120px 20px;
            background: linear-gradient(180deg, #111111 0%, #050505 100%);
            border-bottom: 1px solid #222;
        }
        h1 {
            font-size: 3.5em;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 0 0 10px 0;
        }
        h2 {
            font-size: 1.5em;
            color: #d4af37; /* Cinematic gold accent */
            font-weight: 300;
            letter-spacing: 2px;
            margin: 0;
        }
        .content {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 20px;
            line-height: 1.6;
            color: #cccccc;
        }
        .services {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .service-tag {
            border: 1px solid #333;
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 0.9em;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        footer {
            margin-top: 40px;
            padding: 50px 20px;
            background-color: #0a0a0a;
            border-top: 1px solid #222;
        }
        .contact-info p {
            margin: 10px 0;
            color: #999;
        }
        a {
            color: #d4af37;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        a:hover {
            color: #ffffff;
        }

        /* Responsive Header Styles */
        @media (max-width: 768px) {
            header {
                padding: 60px 20px;
            }
            h1 {
                font-size: 2em;
                letter-spacing: 2px;
            }
            h2 {
                font-size: 1.2em;
                letter-spacing: 1px;
            }
        }

        .whatsapp-float {
            position: fixed;
            width: 60px;
            height: 60px;
            bottom: 25px;
            right: 25px;
            background-color: #25d366;
            color: #FFF;
            border-radius: 50px;
            text-align: center;
            font-size: 30px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
            background-color: #128c7e;
            color: #FFF;
        }
    </style>
</head>
